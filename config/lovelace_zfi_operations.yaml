# Zero Feed-In — Operations Dashboard
#
# Main control loop view: grid power, SOC, battery power, surplus, desired power,
# and device state. This is the primary operational dashboard.
#
# Add as a new view in your Lovelace dashboard (raw YAML mode).
# Works in both normal and debug modes.
#
# Typical metric sequence in this dashboard:
#   1. Grid meter (target is ~30W import)
#   2. Solar surplus estimate
#   3. Battery SOC and actual power
#   4. Operating mode (charging / discharging)
#   5. Desired power (PI output)
#   6. Device state (relay, limits, AC mode)

title: ZFI Operations
icon: mdi:power-settings
cards:
  # ─────────────────────────────────────────────────────────
  #  Row 1: Grid & Surplus Overview
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Grid Status (target ≈ +30W import)
    state_color: true
    entities:
      - entity: sensor.zfi_grid_power
        name: Grid Power
        icon: mdi:transmission-tower

  - type: entities
    title: Solar Surplus
    entities:
      - entity: sensor.zfi_surplus
        name: Estimated Surplus (W)
        icon: mdi:solar-power

  # ─────────────────────────────────────────────────────────
  #  Row 2: Battery Status
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Battery State
    entities:
      - entity: sensor.zfi_soc
        name: State of Charge
        icon: mdi:battery
      - entity: sensor.zfi_battery_power
        name: Battery Power (W)
        icon: mdi:battery-charging

  - type: history-graph
    title: Battery Power (1h)
    hours_to_show: 1
    entities:
      - entity: sensor.zfi_battery_power
        name: Battery power (W)
      - entity: sensor.zfi_grid_power
        name: Grid power (W)

  # ─────────────────────────────────────────────────────────
  #  Row 3: Controller Output & Mode
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Operating Mode & PI Output
    entities:
      - entity: sensor.zfi_mode
        name: Operating Mode
        icon: mdi:swap-vertical
      - entity: sensor.zfi_desired_power
        name: Desired Power (from PI)
        icon: mdi:transmission-tower-export

  - type: history-graph
    title: Desired Power vs Grid (1h)
    hours_to_show: 1
    entities:
      - entity: sensor.zfi_desired_power
        name: Desired power (W)
      - entity: sensor.zfi_grid_power
        name: Grid power (W)

  # ─────────────────────────────────────────────────────────
  #  Row 4: Device commands & state
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: SolarFlow Device Commands
    entities:
      - entity: sensor.zfi_discharge_limit
        name: Discharge Limit (W)
        icon: mdi:battery-arrow-down
      - entity: sensor.zfi_charge_limit
        name: Charge Limit (W)
        icon: mdi:battery-arrow-up
      - entity: sensor.zfi_device_output
        name: Device Output (signed W)
        icon: mdi:transmission-tower-export

  - type: entities
    title: Relay & Locks
    entities:
      - entity: sensor.zfi_relay
        name: Physical Relay
        icon: mdi:electric-switch
      - entity: sensor.zfi_relay_locked
        name: Relay Locked (transition)
        icon: mdi:lock

  # ─────────────────────────────────────────────────────────
  #  Row 5: Limits & Guard Rails
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: SOC Limits & Forecast
    entities:
      - entity: sensor.zfi_effective_min_soc
        name: Effective Min SOC (%)
        icon: mdi:battery-low
      - entity: sensor.zfi_dynamic_min_soc
        name: Dynamic (forecast-adjusted)
        icon: mdi:weather-cloudy-clock

  # ─────────────────────────────────────────────────────────
  #  Row 6: Long-term trend (24h)
  # ─────────────────────────────────────────────────────────
  - type: history-graph
    title: Full Day Control Loop (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.zfi_desired_power
        name: Desired power (W)
      - entity: sensor.zfi_grid_power
        name: Grid power (target +30W)
      - entity: sensor.zfi_surplus
        name: Surplus (W)
