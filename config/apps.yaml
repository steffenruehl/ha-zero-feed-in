# ══════════════════════════════════════════════════════════
#  Zero Feed-In – AppDaemon Configuration
# ══════════════════════════════════════════════════════════
#
#  File: config/appdaemon/apps/apps.yaml
#
#  Two apps:
#    1. Controller – device-agnostic PI, publishes desired power
#    2. Driver – translates desired power to Zendure commands
#
#  Entity names must be adapted to your setup!
# ══════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────
#  Controller (device-agnostic)
# ──────────────────────────────────────────────────────────
zero_feed_in_controller:
  module: zero_feed_in_controller
  class: ZeroFeedInController

  # ── Sensors ─────────────────────────────────────────────
  grid_power_sensor: sensor.smart_meter_sum_active_instantaneous_power
  soc_sensor: sensor.hec4nencn492140_electriclevel

  # Battery power: +discharge/-charge (signed sensor, no negation needed)
  battery_power_sensor: sensor.energy_battery_hec4nencn492140_outputhomepower_hec4nencn492140_gridinputpower_net_power

  # Battery sensor mode: "signed" (default) or "unsigned"
  #   signed   – sensor has correct sign (+discharge/-charge), no extra entity needed
  #   unsigned – sensor is always positive; sign derived from ac_mode_entity
  battery_sensor_mode: signed
  # ac_mode_entity: select.hec4nencn492140_acmode   # required for unsigned mode
  # Alternative unsigned sensor:
  #battery_power_sensor: sensor.battery_plug_power
  #battery_sensor_mode: unsigned
  #ac_mode_entity: select.hec4nencn492140_acmode

  # ── Direction switches (optional) ───────────────────────
  charge_switch: input_boolean.zfi_charge_enabled
  discharge_switch: input_boolean.zfi_discharge_enabled

  # ── Relay lockout feedback (from driver) ────────────────
  relay_locked_sensor: sensor.zfi_relay_locked   # freeze integral during relay transitions

  # ── Controller tuning ───────────────────────────────────
  target_grid_power: 30        # discharge target (W)
  charge_target_power: 0       # charge target (W)
  mode_hysteresis: 50          # Schmitt trigger band (W)
  charge_confirm: 20           # seconds surplus must hold before CHARGING
  deadband: 35
  interval: 5

  # ── Four-quadrant PI gains ─────────────────────────────
  #
  # Derived from step response measurements (April 2025).
  # Formula: Kp = interval / (2 × T1), Ki = Kp / (4 × T1)
  #
  #   Quadrant          Physical action      T1     Kp    Ki
  #   discharge_up      increase discharge   5.0s   0.25  0.025
  #   discharge_down    decrease discharge   3.5s   0.35  0.025
  #   charge_up         increase charge      3.5s   0.17  0.036
  #   charge_down       decrease charge      3.2s   0.23  0.036
  #
  # Selection:
  #                     error >= 0            error < 0
  #   DISCHARGING       discharge_up          discharge_down
  #   CHARGING          charge_down           charge_up
  #
  kp_discharge_up: 0.25
  kp_discharge_down: 0.35
  kp_charge_up: 0.17
  kp_charge_down: 0.23

  ki_discharge_up: 0.025  # was 0.012, Ti: 21s → 10s (2×T1)
  ki_discharge_down: 0.025
  ki_charge_up: 0.036   # was 0.012, Ti: 14s → 4.7s
  ki_charge_down: 0.036 # was 0.018, Ti: 13s → 6.4s

  # ── Feed-forward sources (optional) ─────────────────────
  # Each source tracks a sensor and applies sign × gain × delta.
  # sign: -1.0 for generation (PV), +1.0 for loads (wallbox, dryer).
  # Deadband is applied to the total sum, not per source.
  ff_enabled: true
  ff_deadband: 30               # ignore total FF below this (W)
  ff_filter_tau_s: 30           # EMA time constant for filtered derivative (s); α=5/35≈0.14
  feed_forward_sources:
    - entity: sensor.solarstrom_switch_0_power
      gain: 0.6
      sign: -1.0          # PV drop → increase discharge
  # Load sources disabled – add back individually once PV FF is validated:
  #  - entity: sensor.power_waschmaschine_active_power_3
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_trockner_active_power_4
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_sat_active_power_2
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_drucker_active_power
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_geschirrspuler_active_power_5
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_dampfgarer_active_power_6
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.power_office_steffen_active_power_7
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.solar_plug_1_active_power_8
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.solar_outlet_keller_active_power
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.heating_outlet_switch_0_power
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.car_power
  #    gain: 0.7
  #    sign: 1.0
  #  - entity: sensor.brunnen_plug_power
  #    gain: 0.7
  #    sign: 1.0



  # ── Power limits ────────────────────────────────────────
  max_output: 1200             # max discharge (W)
  max_charge: 800             # max charge (W)
  min_soc: 15
  max_soc: 85

  # ── Protection ──────────────────────────────────────────
  max_feed_in: 800
  emergency_kp_multiplier: 4.0

  # ── Debug ───────────────────────────────────────────────
  dry_run: false
  debug: true                   # publish PI internals (p_term, i_term, etc.)
  sensor_prefix: sensor.zfi
  log_dir: /config/logs          # CSV file logging (empty = disabled)

# ──────────────────────────────────────────────────────────
#  SolarFlow MQTT Watchdog
# ──────────────────────────────────────────────────────────
solarflow_mqtt_watchdog:
  module: solarflow_mqtt_watchdog
  class: SolarFlowMqttWatchdog

  solarflow_ip:   !secret solarflow_ip
  serial_number:  !secret solarflow_serial
  mqtt_broker_ip: !secret mqtt_broker_ip
  mqtt_port:      1883
  mqtt_username:  !secret mqtt_username
  mqtt_password:  !secret mqtt_password

  watch_entity:          sensor.hec4nencn492140_electriclevel
  unavailable_duration_s: 120          # Reconnect nach 2 min unavailable
  startup_delay_s:        30           # Warten auf Mosquitto nach HA-Start

  dry_run: false

# ──────────────────────────────────────────────────────────
#  Zendure SolarFlow Driver
# ──────────────────────────────────────────────────────────
zendure_solarflow_driver:
  module: zendure_solarflow_driver
  class: ZendureSolarFlowDriver

  # ── Input (from controller) ─────────────────────────────
  desired_power_sensor: sensor.zfi_desired_power

  # ── Actuators ───────────────────────────────────────────
  output_limit_entity: number.hec4nencn492140_outputlimit
  input_limit_entity: number.hec4nencn492140_inputlimit
  ac_mode_entity: select.hec4nencn492140_acmode

  # ── Driver settings ────────────────────────────────────
  watchdog_s: 5                # re-run even when desired_power hasn't changed
  relay_lockout_ws: 6000       # W·s the accumulator must reach before a direction change
                               # (was: adaptive_lockout_ref_w × direction_lockout = 200×10)
  relay_lockout_cutoff_w: 25   # floor on power used in accumulator (W); max wait = ws/cutoff
  relay_lockout_idle_s: 60     # time (s) before switching to idle

  relay_sm_enabled: true        # set false to disable state machine
  min_active_power_w: 25       # minimum power floor in active states (W)

  # ── Debug ───────────────────────────────────────────────
  dry_run: false
  debug: true                   # publish relay SM internals (lockout %, etc.)
  sensor_prefix: sensor.zfi
  log_dir: /config/logs          # CSV file logging (empty = disabled)
