# ══════════════════════════════════════════════════════════
#  Zero Feed-In – AppDaemon Configuration
# ══════════════════════════════════════════════════════════
#
#  File: config/appdaemon/apps/apps.yaml
#
#  Two apps:
#    1. Controller – device-agnostic PI, publishes desired power
#    2. Driver – translates desired power to Zendure commands
#
#  Entity names must be adapted to your setup!
# ══════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────
#  Controller (device-agnostic)
# ──────────────────────────────────────────────────────────
zero_feed_in_controller:
  module: zero_feed_in_controller
  class: ZeroFeedInController

  # ── Sensors ─────────────────────────────────────────────
  grid_power_sensor: sensor.smart_meter_sum_active_instantaneous_power
  soc_sensor: sensor.hec4nencn492140_electriclevel

  # Battery power: +discharge/-charge (signed sensor, no negation needed)
  battery_power_sensor: sensor.energy_battery_hec4nencn492140_outputhomepower_hec4nencn492140_gridinputpower_net_power

  # Battery sensor mode: "signed" (default) or "unsigned"
  #   signed   – sensor has correct sign (+discharge/-charge), no extra entity needed
  #   unsigned – sensor is always positive; sign derived from ac_mode_entity
  battery_sensor_mode: signed
  # ac_mode_entity: select.hec4nencn492140_acmode   # required for unsigned mode
  # Alternative unsigned sensor:
  #battery_power_sensor: sensor.battery_plug_power
  #battery_sensor_mode: unsigned
  #ac_mode_entity: select.hec4nencn492140_acmode

  # ── Direction switches (optional) ───────────────────────
  charge_switch: input_boolean.zfi_charge_enabled
  discharge_switch: input_boolean.zfi_discharge_enabled

  # ── Controller tuning ───────────────────────────────────
  target_grid_power: 30        # discharge target (W)
  charge_target_power: 0       # charge target (W)
  mode_hysteresis: 50          # Schmitt trigger band (W)
  charge_confirm: 20           # seconds surplus must hold before CHARGING
  kp_up: 0.4
  kp_down: 0.45
  ki_up: 0.04
  ki_down: 0.05
  deadband: 35
  interval: 5

  # ── Power limits ────────────────────────────────────────
  max_output: 800              # max discharge (W)
  max_charge: 2400             # max charge (W)
  min_soc: 10
  max_soc: 85

  # ── Protection ──────────────────────────────────────────
  max_feed_in: 800
  emergency_kp_multiplier: 4.0

  # ── Debug ───────────────────────────────────────────────
  dry_run: false
  sensor_prefix: sensor.zfi

# ──────────────────────────────────────────────────────────
#  Zendure SolarFlow Driver
# ──────────────────────────────────────────────────────────
zendure_solarflow_driver:
  module: zendure_solarflow_driver
  class: ZendureSolarFlowDriver

  # ── Input (from controller) ─────────────────────────────
  desired_power_sensor: sensor.zfi_desired_power

  # ── Actuators ───────────────────────────────────────────
  output_limit_entity: number.hec4nencn492140_outputlimit
  input_limit_entity: number.hec4nencn492140_inputlimit
  ac_mode_entity: select.hec4nencn492140_acmode

  # ── Driver settings ────────────────────────────────────
  interval: 2                  # poll interval (s) — faster than controller
  direction_lockout: 30        # base relay lockout (s)
  relay_sm_enabled: true        # set false to disable state machine
  adaptive_lockout_ref_w: 200  # full-speed lockout at this power (W)

  # ── Debug ───────────────────────────────────────────────
  dry_run: false
  sensor_prefix: sensor.zfi
