# Zero Feed-In — Controller Debug Dashboard
#
# Internal direct-calculation controller signals: error, drift accumulator,
# muting state, and decision reasons. Useful for understanding why the
# controller chose a particular desired power.
#
# Add as a new view in your Lovelace dashboard (raw YAML mode).
# REQUIRES: debug: true in apps.yaml
#
# Core algorithm:
#   new_limit = last_sent + ki × error
#
# Muting:
#   After each command, ignore new readings for muting_s seconds to let the
#   device respond. Prevents chasing stale sensor data.
#
# Hysteresis & drift:
#   Sub-hysteresis errors accumulate in drift_acc. When drift exceeds the
#   hysteresis threshold, a correction fires.

title: ZFI Controller Debug
icon: mdi:chart-line
cards:
  # ─────────────────────────────────────────────────────────
  #  Row 1: Error & Target
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Control Loop Target & Error
    entities:
      - entity: sensor.zfi_target
        name: Target (W)
        icon: mdi:target
      - entity: sensor.zfi_grid_power
        name: Actual Grid Power (W)
        icon: mdi:transmission-tower
      - entity: sensor.zfi_error
        name: Error (grid − target, W)
        icon: mdi:delta

  - type: history-graph
    title: Error (30 min)
    hours_to_show: 0.5
    entities:
      - entity: sensor.zfi_error
        name: Error (W)

  # ─────────────────────────────────────────────────────────
  #  Row 2: Muting & Drift
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Muting & Drift Accumulator
    entities:
      - entity: sensor.zfi_muting
        name: Muted (1 = yes, 0 = no)
        icon: mdi:timer-sand
      - entity: sensor.zfi_muting_remaining
        name: Muting remaining (s)
        icon: mdi:timer-sand
      - entity: sensor.zfi_drift_acc
        name: Drift accumulator (W)
        icon: mdi:sigma

  - type: history-graph
    title: Drift Accumulator (30 min)
    hours_to_show: 0.5
    entities:
      - entity: sensor.zfi_drift_acc
        name: Drift (W)

  - type: history-graph
    title: Muting State (30 min)
    hours_to_show: 0.5
    entities:
      - entity: sensor.zfi_muting
        name: Muted
      - entity: sensor.zfi_muting_remaining
        name: Remaining (s)

  # ─────────────────────────────────────────────────────────
  #  Row 3: Desired Power & Decision
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Output & Reason
    entities:
      - entity: sensor.zfi_desired_power
        name: Desired power (W)
        icon: mdi:flash
      - entity: sensor.zfi_reason
        name: Last decision reason
        icon: mdi:information-outline
      - entity: sensor.zfi_mode
        name: Operating mode
        icon: mdi:swap-vertical

  - type: history-graph
    title: Desired Power vs Grid Power (30 min)
    hours_to_show: 0.5
    entities:
      - entity: sensor.zfi_desired_power
        name: Desired power
      - entity: sensor.zfi_grid_power
        name: Grid power

  # ─────────────────────────────────────────────────────────
  #  Row 4: Mode Changes
  # ─────────────────────────────────────────────────────────
  - type: history-graph
    title: Mode Changes (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.zfi_mode
        name: Operating mode

  # ─────────────────────────────────────────────────────────
  #  Row 5: Surplus & Guards
  # ─────────────────────────────────────────────────────────
  - type: entities
    title: Surplus & SOC Guards
    entities:
      - entity: sensor.zfi_surplus
        name: Estimated solar surplus (W)
        icon: mdi:solar-power
      - entity: sensor.zfi_soc
        name: Battery SOC (%)
        icon: mdi:battery
      - entity: sensor.zfi_effective_min_soc
        name: Min SOC limit (%)
        icon: mdi:battery-low

  - type: history-graph
    title: Surplus vs Mode (30 min)
    hours_to_show: 0.5
    entities:
      - entity: sensor.zfi_surplus
        name: Surplus (W)
      - entity: sensor.zfi_mode
        name: Mode
